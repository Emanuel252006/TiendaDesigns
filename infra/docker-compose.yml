# Docker Compose configuration for deploying both backend and frontend in a single instance
# Backend runs on port 3000, frontend (built static) served by nginx on port 80

version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tienda-backend
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - "3001:3001"
    working_dir: /app
    volumes:
      - ../backend/src:/app/src
      - ../backend/images:/app/images
      - ../backend/invoices:/app/invoices
    depends_on:
      - frontend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tienda-frontend
    restart: always
    environment:
      - NODE_ENV=production
    # Expose only to backend/nginx, not to host
    volumes:
      - frontend-build:/usr/share/nginx/html
    # No ports exposed, nginx will serve static files

  nginx:
    image: nginx:alpine
    container_name: tienda-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - frontend-build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend

volumes:
  frontend-build:
    driver: local
